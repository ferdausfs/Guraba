name: Android APK Build & Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Flutter আগে setup — settings.gradle এ flutter.sdk দরকার
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # local.properties CI-তে থাকে না (gitignored)
      - name: Create android/local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"  > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      # System Gradle 9.x project-এর সাথে incompatible
      # তাই সঠিক version (8.14.2) আলাদাভাবে install করতে হবে
      - name: Setup Gradle 8.14.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.2"
          cache-read-only: false

      # gradlew repo-তে নেই (gitignored) — Gradle 8.14.2 দিয়ে generate করো
      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION%%+*}
          VERSION_CODE=${VERSION##*+}
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      # GitHub Actions if: এ secrets.XXX চলে না — env দিয়ে pass করো
      - name: Prepare Android signing
        shell: bash
        env:
          KEYSTORE_B64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          _STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          _KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          _KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Keystore found — setting up release signing..."
            KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
            echo "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
            echo "KEYSTORE_FILE=$KEYSTORE_PATH"    >> "$GITHUB_ENV"
            echo "STORE_PASSWORD=$_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$_KEY_ALIAS"           >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$_KEY_PASSWORD"     >> "$GITHUB_ENV"
          else
            echo "No keystore — falling back to debug signing."
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build release app bundle
        run: flutter build appbundle --release

      - name: Prepare release assets
        shell: bash
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          cp build/app/outputs/flutter-apk/*.apk release-assets/
          cp build/app/outputs/bundle/release/*.aab release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guraba-android-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: release-assets/*
          if-no-files-found: error

      - name: Move rolling release tag
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa auto-build -m "Automated build for ${GITHUB_SHA}"
          git push origin refs/tags/auto-build --force

      - name: Publish rolling GitHub release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: release-assets/*
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          name: Guraba Auto Build
          prerelease: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: auto-build
          body: |
            Automated rolling Android release for Guraba.

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Version: `${{ steps.version.outputs.version }}`

            Release assets include split APKs, the Play Store AAB, and SHA256 checksums.
